<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witcher Product Launch</title>
    <link rel="stylesheet" href="styles.css">
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelector('header').classList.add('visible');
    });
    </script>
</head>
<body>

    <header>
        <h1>The Wolf's New Arsenal</h1>
        <p class="tagline">Forged in fire. Tempered in blood.</p>
    </header>

    <main>
        <section class="product-intro">
            <img src="Witcher.webp" 
                 alt="Witcher Gear" 
                 class="product-image">
            <button class="buy-now">Claim Your Gear</button>
        </section>

        <section class="features">
            <h2>Forged Features</h2>
            <ul>
                <li class="feature-item">⚔ Mastercrafted Steel</li>
                <li class="feature-item">🐺 Wolf School Precision</li>
                <li class="feature-item">🔥 Enchanted Durability</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>© 2024 The Wolf's Arsenal</p>
    </footer>

</body>
</html>
